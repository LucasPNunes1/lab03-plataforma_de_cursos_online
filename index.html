<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Cursos</title>

    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg border-bottom bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="assets/img/logo.png" width="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Core</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/conteudo.html">Conteúdo</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/interacao.html">Interação</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/curadoria.html">Curadoria</a></li>
                    <li class="nav-item"><a class="nav-link" href="pages/negocio.html">Negócio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL (Tabs e Listagens) -->
    <main class="container mt-4">
        <!-- Notificações Globais do UIUtils -->
        <div id="alerta" class="alert d-none" role="alert"></div>

        <ul class="nav nav-tabs" id="coreTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabUsuarios">Usuários</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCategorias">Categorias</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCursos">Cursos</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- SEÇÃO: USUÁRIOS -->
            <div class="tab-pane fade show active" id="tabUsuarios">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalUsuario">+ Novo
                    Usuário</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaUsuarios"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: CATEGORIAS -->
            <div class="tab-pane fade" id="tabCategorias">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalCategoria">+ Nova
                    Categoria</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaCategorias"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: CURSOS -->
            <div class="tab-pane fade" id="tabCursos">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCurso">+ Novo
                        Curso</button>
                    <div class="d-flex align-items-center">
                        <label class="me-2 mb-0">Filtrar:</label>
                        <select id="filtroCategoriaCurso" class="form-select w-auto">
                            <option value="todos">Todas</option>
                        </select>
                    </div>
                </div>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Instrutor</th>
                            <th>Nível</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaCursos"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- SEÇÃO: MODAIS -->

    <!-- SEÇÃO: MODAL DO USUÁRIO -->
    <div class="modal fade" id="modalUsuario" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formUsuario" onsubmit="salvarEntidade(this, 'core', 'usuarios'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastro de Usuário</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" name="nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" name="senhaHash" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MODAL DA CATEGORIA -->
    <div class="modal fade" id="modalCategoria" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formCategoria" onsubmit="salvarEntidade(this, 'core', 'categorias'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastro de Categoria</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" class="form-control" name="nome" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" name="descricao"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MODAL DO CURSO -->
    <div class="modal fade" id="modalCurso" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form id="formCurso" onsubmit="salvarEntidade(this, 'core', 'cursos'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastro de Curso</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Título</label>
                                <input type="text" class="form-control" name="titulo" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Categoria</label>
                                <select class="form-select" name="idCategoria" id="idCategoriaCurso" required></select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" name="descricao"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Instrutor</label>
                                <select class="form-select sel-usuarios" name="idInstrutor" required></select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nível</label>
                                <select class="form-select" name="nivel">
                                    <option value="Iniciante">Iniciante</option>
                                    <option value="Intermediário">Intermediário</option>
                                    <option value="Avançado">Avançado</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Total Horas</label>
                                <input type="number" class="form-control" name="totalHoras" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/vendor/popper.min.js"></script>
    <script src="assets/js/vendor/bootstrap.min.js"></script>
    <script type="module" src="js/main.mjs"></script>
</body>

</html>
