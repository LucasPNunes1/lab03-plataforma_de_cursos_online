<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Cursos</title>

    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="img/logo.png" width="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Core</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudo.html">Conteúdo</a></li>
                    <li class="nav-item"><a class="nav-link" href="interacao.html">Interação</a></li>
                    <li class="nav-item"><a class="nav-link active" href="curadoria.html">Curadoria</a></li>
                    <li class="nav-item"><a class="nav-link" href="negocio.html">Negócio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <ul class="nav nav-tabs" id="curadoriaTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabTrilhas">Trilhas</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCertificados">Certificados</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- SEÇÃO: TRILHAS -->
            <div class="tab-pane fade show active" id="tabTrilhas">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTrilha">+ Nova Trilha</button>
                <table class="table table-striped">
                    <thead><tr><th>ID</th><th>Título</th><th>Categoria</th></tr></thead>
                    <tbody id="listaTrilhas"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: CERTIFICADOS -->
            <div class="tab-pane fade" id="tabCertificados">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalCertificado">+ Emitir Certificado</button>
                <table class="table table-striped">
                    <thead><tr><th>Código</th><th>Usuário</th><th>Curso/Trilha</th><th>Data</th></tr></thead>
                    <tbody id="listaCertificados"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalTrilha" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formTrilha">
                    <div class="modal-header"><h5 class="modal-title">Nova Trilha</h5></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" class="form-control" id="tituloTrilha" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoria</label>
                            <select class="form-select" id="idCategoriaTrilha" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" id="descTrilha"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Salvar</button></div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCertificado" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formCertificado">
                    <div class="modal-header"><h5 class="modal-title">Emitir Certificado</h5></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <select class="form-select sel-usuarios" id="idUsuarioCertificado" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Curso (Opcional)</label>
                            <select class="form-select sel-cursos" id="idCursoCertificado"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Código de Verificação</label>
                            <input type="text" class="form-control" id="codigoCertificado" required>
                        </div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Gerar</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/libs/popper.min.js"></script>
    <script src="js/libs/bootstrap.min.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
