<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Cursos</title>

    <link rel="stylesheet" href="../assets/css/vendor/bootstrap.min.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg border-bottom bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../assets/img/logo.png" width="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Core</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudo.html">Conteúdo</a></li>
                    <li class="nav-item"><a class="nav-link" href="interacao.html">Interação</a></li>
                    <li class="nav-item"><a class="nav-link active" href="curadoria.html">Curadoria</a></li>
                    <li class="nav-item"><a class="nav-link" href="negocio.html">Negócio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL (Tabs e Listagens) -->
    <main class="container mt-4">
        <div id="alerta" class="alert d-none" role="alert"></div>

        <ul class="nav nav-tabs" id="curadoriaTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabTrilhas">Trilhas</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabCertificados">Certificados</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabTrilhasCursos">Cursos da Trilha</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- SEÇÃO: TRILHAS -->
            <div class="tab-pane fade show active" id="tabTrilhas">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTrilha">+ Nova Trilha</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título</th>
                            <th>Categoria</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaTrilhas"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: CERTIFICADOS -->
            <div class="tab-pane fade" id="tabCertificados">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalCertificado">+ Emitir Certificado</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Usuário</th>
                            <th>Curso/Trilha</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaCertificados"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: CURSOS DA TRILHA -->
            <div class="tab-pane fade" id="tabTrilhasCursos">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTrilhaCurso">+ Adicionar Curso à Trilha</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Trilha</th>
                            <th>Curso</th>
                            <th>Ordem</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaTrilhasCursos"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- SEÇÃO: MODAIS -->

    <!-- SEÇÃO: MODAL DO CURSO DA TRILHA -->
    <div class="modal fade" id="modalTrilhaCurso" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formTrilhaCurso" onsubmit="salvarEntidade(this, 'curadoria', 'trilhas_cursos'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Adicionar Curso à Trilha</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Trilha</label>
                            <select class="form-select sel-trilhas" name="idTrilha" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Curso</label>
                            <select class="form-select sel-cursos" name="idCurso" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ordem de Exibição</label>
                            <input type="number" class="form-control" name="ordem" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MODAL DA TRILHA -->
    <div class="modal fade" id="modalTrilha" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formTrilha" onsubmit="salvarEntidade(this, 'curadoria', 'trilhas'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastro de Trilha</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Título</label>
                            <input type="text" class="form-control" name="titulo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoria</label>
                            <select class="form-select sel-categorias" name="idCategoria" id="idCategoriaTrilha" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" name="descricao"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MODAL DO CERTIFICADO -->
    <div class="modal fade" id="modalCertificado" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formCertificado" onsubmit="salvarEntidade(this, 'curadoria', 'certificados'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Emissão de Certificado</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <select class="form-select sel-usuarios" name="idUsuario" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Curso (Opcional)</label>
                            <select class="form-select sel-cursos" name="idCurso"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Código de Verificação</label>
                            <input type="text" class="form-control" name="codigoVerificacao" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Gerar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/vendor/popper.min.js"></script>
    <script src="../assets/js/vendor/bootstrap.min.js"></script>
    <script type="module" src="../js/main.mjs"></script>

</body>

</html>
