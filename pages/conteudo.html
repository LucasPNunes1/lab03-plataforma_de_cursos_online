<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Cursos</title>

    <link rel="stylesheet" href="../assets/css/vendor/bootstrap.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../assets/img/logo.png" width="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Core</a></li>
                    <li class="nav-item"><a class="nav-link active" href="conteudo.html">Conteúdo</a></li>
                    <li class="nav-item"><a class="nav-link" href="interacao.html">Interação</a></li>
                    <li class="nav-item"><a class="nav-link" href="curadoria.html">Curadoria</a></li>
                    <li class="nav-item"><a class="nav-link" href="negocio.html">Negócio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        <div id="alerta" class="alert d-none" role="alert"></div>

        <ul class="nav nav-tabs" id="conteudoTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabModulos">Módulos</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabAulas">Aulas</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- SEÇÃO: MÓDULOS -->
            <div class="tab-pane fade show active" id="tabModulos">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalModulo">+ Novo Módulo</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Curso</th>
                            <th>Título</th>
                            <th>Ordem</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaModulos"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: AULAS -->
            <div class="tab-pane fade" id="tabAulas">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalAula">+ Nova Aula</button>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Módulo</th>
                            <th>Título</th>
                            <th>Tipo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaAulas"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalModulo" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formModulo" onsubmit="salvarEntidade(this, 'conteudo', 'modulos'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastro de Módulo</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Curso</label>
                            <select class="form-select sel-cursos" name="idCurso" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Título do Módulo</label>
                            <input type="text" class="form-control" name="titulo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ordem</label>
                            <input type="number" class="form-control" name="ordem" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAula" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form id="formAula" onsubmit="salvarEntidade(this, 'conteudo', 'aulas'); return false;">
                    <div class="modal-header">
                        <h5 class="modal-title">Cadastro de Aula</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Módulo</label>
                                <select class="form-select" name="idModulo" id="idModuloAula" required></select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Título da Aula</label>
                                <input type="text" class="form-control" name="titulo" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" name="tipo">
                                    <option value="Vídeo">Vídeo</option>
                                    <option value="Texto">Texto</option>
                                    <option value="PDF">PDF</option>
                                    <option value="Quiz">Quiz</option>
                                </select>
                            </div>
                            <div class="col-md-8 mb-3">
                                <label class="form-label">URL do Conteúdo</label>
                                <input type="text" class="form-control" name="urlConteudo">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Duração (minutos)</label>
                                <input type="number" class="form-control" name="duracao">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Ordem</label>
                                <input type="number" class="form-control" name="ordem" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/vendor/popper.min.js"></script>
    <script src="../assets/js/vendor/bootstrap.min.js"></script>
    <script type="module" src="../js/main.mjs"></script>

</body>

</html>
