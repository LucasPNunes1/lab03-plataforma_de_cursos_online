<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Cursos</title>

    <link rel="stylesheet" href="../assets/css/vendor/bootstrap.min.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg border-bottom bg-dark" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="../assets/img/logo.png" width="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Core</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudo.html">Conteúdo</a></li>
                    <li class="nav-item"><a class="nav-link active" href="interacao.html">Interação</a></li>
                    <li class="nav-item"><a class="nav-link" href="curadoria.html">Curadoria</a></li>
                    <li class="nav-item"><a class="nav-link" href="negocio.html">Negócio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL (Tabs e Listagens) -->
    <main class="container mt-4">
        <div id="alerta" class="alert d-none" role="alert"></div>

        <ul class="nav nav-tabs" id="interacaoTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabMatriculas">Matrículas</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabProgresso">Progresso</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabAvaliacoes">Avaliações</button>
            </li>
        </ul>

        <div class="tab-content mt-3">
            <!-- SEÇÃO: MATRÍCULAS -->
            <div class="tab-pane fade show active" id="tabMatriculas">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalMatricula">+ Nova Matrícula</button>
                <table class="table table-striped">
                    <thead><tr><th>ID</th><th>Usuário</th><th>Curso</th><th>Data</th><th>Ações</th></tr></thead>
                    <tbody id="listaMatriculas"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: PROGRESSO -->
            <div class="tab-pane fade" id="tabProgresso">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalProgresso">+ Registrar Progresso</button>
                <table class="table table-striped">
                    <thead><tr><th>Usuário</th><th>Aula</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="listaProgresso"></tbody>
                </table>
            </div>

            <!-- SEÇÃO: AVALIAÇÕES -->
            <div class="tab-pane fade" id="tabAvaliacoes">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalAvaliacao">+ Nova Avaliação</button>
                <table class="table table-striped">
                    <thead><tr><th>Usuário</th><th>Curso</th><th>Nota</th><th>Ações</th></tr></thead>
                    <tbody id="listaAvaliacoes"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- SEÇÃO: MODAIS -->

    <!-- SEÇÃO: MODAL DA MATRÍCULA -->
    <div class="modal fade" id="modalMatricula" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formMatricula" onsubmit="salvarEntidade(this, 'interacao', 'matriculas'); return false;">
                    <div class="modal-header"><h5 class="modal-title">Nova Matrícula</h5></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <select class="form-select sel-usuarios" name="idUsuario" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Curso</label>
                            <select class="form-select sel-cursos" name="idCurso" required></select>
                        </div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Matricular</button></div>
                </form>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MODAL DO PROGRESSO -->
    <div class="modal fade" id="modalProgresso" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formProgresso" onsubmit="salvarEntidade(this, 'interacao', 'progressos'); return false;">
                    <div class="modal-header"><h5 class="modal-title">Registrar Progresso</h5></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <select class="form-select sel-usuarios" name="idUsuario" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ID Aula</label>
                            <input type="text" class="form-control" name="idAula" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="status">
                                <option value="Iniciado">Iniciado</option>
                                <option value="Em Andamento">Em Andamento</option>
                                <option value="Concluído">Concluído</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Salvar</button></div>
                </form>
            </div>
        </div>
    </div>

    <!-- SEÇÃO: MODAL DA AVALIAÇÃO -->
    <div class="modal fade" id="modalAvaliacao" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="formAvaliacao" onsubmit="salvarEntidade(this, 'interacao', 'avaliacoes'); return false;">
                    <div class="modal-header"><h5 class="modal-title">Nova Avaliação</h5></div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <select class="form-select sel-usuarios" name="idUsuario" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Curso</label>
                            <select class="form-select sel-cursos" name="idCurso" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nota (0-5)</label>
                            <input type="number" class="form-control" name="nota" min="0" max="5" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Comentário</label>
                            <textarea class="form-control" name="comentario"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-primary">Enviar</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="../assets/js/vendor/popper.min.js"></script>
    <script src="../assets/js/vendor/bootstrap.min.js"></script>
    <script type="module" src="../js/main.mjs"></script>

</body>

</html>
